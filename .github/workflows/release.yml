name: release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all --locked

      - name: Build release binary
        run: cross build --release --locked --target ${{ matrix.target }} --bin aurora-kvm-agent
        env:
          AWS_LC_SYS_NO_ASM: 1
          AWS_LC_SYS_IGNORE_COMPILER_CHECK: 1

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aurora-kvm-agent dist/aurora-kvm-agent
          tar -C dist -czf kvm-agent-linux-${{ matrix.arch }}.tar.gz aurora-kvm-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvm-agent-${{ matrix.arch }}
          path: kvm-agent-linux-${{ matrix.arch }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: kvm-agent-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: kvm-agent-arm64

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kvm-agent-linux-amd64.tar.gz
            kvm-agent-linux-arm64.tar.gz
