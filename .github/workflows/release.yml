name: release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: kvm-agent-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --all --locked

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  build:
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Build release binary
        run: cross build --release --locked --target ${{ matrix.target }} --bin aurora-kvm-agent

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/aurora-kvm-agent dist/aurora-kvm-agent
          tar -C dist -czf kvm-agent-linux-${{ matrix.arch }}.tar.gz aurora-kvm-agent

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kvm-agent-${{ matrix.arch }}
          path: kvm-agent-linux-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download amd64 artifact
        uses: actions/download-artifact@v4
        with:
          name: kvm-agent-amd64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: kvm-agent-arm64

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kvm-agent-linux-amd64.tar.gz
            kvm-agent-linux-arm64.tar.gz
