syntax = "proto3";

package agent.registry.v1;

import "proto/agent/registry/v1/agent_common.proto";
import "proto/agent/registry/v1/agent_enrollment.proto";
import "proto/agent/registry/v1/agent_telemetry.proto";

option go_package = "hypervisor/internal/transport/grpc/agentregistryv1";

service AgentRegistry {
  rpc AgentControlStream(stream AgentToHypervisor) returns (stream HypervisorToAgent);
  rpc BootstrapEnrollAgent(BootstrapEnrollAgentRequest) returns (BootstrapEnrollAgentResponse);
}

message AgentToHypervisor {
  string stream_id = 1;
  uint64 seq = 2;
  oneof message {
    RegisterHost register_host = 3;
    AgentHeartbeat heartbeat = 4;
    HostInventory host_inventory = 5;
    NodeMetricSample node_metric = 6;
    VPSMetricSample vps_metric = 7;
    AgentCommandResult command_result = 8;
  }
}

message HypervisorToAgent {
  string stream_id = 1;
  uint64 seq = 2;
  oneof message {
    RegisterAck register_ack = 3;
    HeartbeatAck heartbeat_ack = 4;
    AgentCommand command = 5;
  }
}
